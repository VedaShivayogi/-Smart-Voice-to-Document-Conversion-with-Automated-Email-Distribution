<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VoiceTranslate — Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c28;
      --border: #2a2a3d;
      --accent: #e8631a;
      --accent2: #ff8c42;
      --text: #f0f0f5;
      --muted: #6b6b8a;
      --red: #ff4757;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,99,26,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,99,26,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,99,26,0.08) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    /* REVA top bar */
    .reva-bar {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: rgba(19,19,26,0.95);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 28px;
      margin-bottom: 28px;
      animation: fadeUp 0.4s ease both;
    }
    .reva-bar img {
      height: 44px;
      object-fit: contain;
      filter: brightness(1.1);
    }
    .reva-info { text-align: left; }
    .reva-name {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }
    .reva-sub {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 380px;
      padding: 0 20px;
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo { text-align: center; margin-bottom: 28px; }
    .logo-icon {
      width: 52px; height: 52px;
      background: var(--accent);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      margin: 0 auto 12px;
      box-shadow: 0 0 30px rgba(232,99,26,0.35);
    }
    .logo-title { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; }
    .logo-title span { color: var(--accent); }
    .logo-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 30px;
    }
    .card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 7px; display: block; }
    .input-group { margin-bottom: 16px; }
    input[type="email"], input[type="password"] {
      width: 100%; padding: 11px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 14px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,99,26,0.12); }
    input::placeholder { color: var(--muted); }
    .btn-login {
      width: 100%; padding: 13px;
      background: var(--accent); color: #fff; border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; margin-top: 6px; transition: all 0.2s;
    }
    .btn-login:hover { background: var(--accent2); box-shadow: 0 4px 20px rgba(232,99,26,0.4); transform: translateY(-1px); }
    .error-msg {
      background: rgba(255,71,87,0.1); border: 1px solid rgba(255,71,87,0.3);
      color: var(--red); border-radius: 8px; padding: 10px 14px;
      font-size: 13px; margin-bottom: 16px; text-align: center;
    }
    .footer-note { text-align: center; font-size: 11px; color: var(--muted); margin-top: 18px; }
  </style>
</head>
<body>

  <!-- REVA University Logo Bar -->
  <div class="reva-bar">
    <img src="https://www.reva.edu.in/icrtacm-2024/assets/pages/img/REVA_Logo_2.png" alt="REVA University" onerror="this.style.display='none'" />
    <div class="reva-info">
      <div class="reva-name">REVA University</div>
      <div class="reva-sub">REVA Academy for Corporate Excellence · RACE</div>
    </div>
  </div>

  <div class="login-wrap">
    <div class="logo">
      <div class="logo-icon">🎤</div>
      <div class="logo-title">Voice<span>Translate</span></div>
      <div class="logo-sub">Speech · Translation · Email</div>
    </div>

    <div class="card">
      {% with messages = get_flashed_messages() %}
      {% if messages %}
      <div class="error-msg">{{ messages[0] }}</div>
      {% endif %}
      {% endwith %}

      <form method="POST">
        <div class="input-group">
          <label class="card-label">Email</label>
          <input type="email" name="email" placeholder="your@email.com" required autofocus />
        </div>
        <div class="input-group">
          <label class="card-label">Password</label>
          <input type="password" name="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-login">Sign In →</button>
      </form>
    </div>

    <div class="footer-note">VoiceTranslate Pro · REVA University · Flask + deep-translator</div>
  </div>
</body>
</html>
